<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --attacker-color: #da3633;
            --target-color: #e3b341;
            --judge-color: #2ea043;
            
            --sev-1: #8b949e;
            --sev-2: #58a6ff;
            --sev-3: #e3b341;
            --sev-4: #f78166;
            --sev-5: #da3633;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            background-color: #010409;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .top-nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .top-nav a:hover {
            color: #c9d1d9;
        }

        #clear-log-btn {
            background-color: #21262d;
            color: #8b949e;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #clear-log-btn:hover {
            background-color: #30363d;
            color: #c9d1d9;
            border-color: #8b949e;
        }

        .header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            color: #8b949e;
        }

        .diagram-container {
            margin: 20px 0;
        }

        .status-bar {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 40px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            min-height: 28px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .attempt-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card-title {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .skill-name {
            font-size: 0.9rem;
            color: #8b949e;
            font-family: monospace;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
        }

        .sev-1 { background-color: var(--sev-1); }
        .sev-2 { background-color: var(--sev-2); }
        .sev-3 { background-color: var(--sev-3); }
        .sev-4 { background-color: var(--sev-4); }
        .sev-5 { background-color: var(--sev-5); }

        .card-body p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .card-label {
            font-weight: 600;
            color: #58a6ff;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 4px;
        }

        .text-content {
            background-color: #010409;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
        }

        .run-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--attacker-color);
            color: white;
            border: none;
            border-radius: 24px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(218, 54, 51, 0.4);
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .run-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #f85149;
        }

        .run-btn:disabled {
            background-color: #30363d;
            cursor: not-allowed;
            box-shadow: none;
            color: #8b949e;
        }

        #report-btn {
            display: inline-block;
            padding: 10px 20px;
            color: var(--text-color);
            background-color: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        #report-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            color: #ffffff;
        }

        /* SVG Animations */
        .edge {
            stroke-dasharray: 6 4;
            transition: stroke 0.3s, stroke-width 0.3s;
        }
        .edge.active {
            stroke-width: 2.5;
            animation: dash 0.4s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        #mcpLabel.active {
            fill: #EF9F27;
            font-weight: 600;
        }

        @keyframes flashJudge {
            0% { fill: #0a1f1a; }
            50% { fill: var(--flash-color); stroke-width: 4px; }
            100% { fill: #0a1f1a; }
        }

        .flash-judge {
            animation: flashJudge 1s ease-out;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/report" target="_blank">View Full Report →</a>
        <button id="clear-log-btn">Clear Log</button>
    </div>

    <div class="header">
        <h1>Sentinel</h1>
        <p>Multi-Agent Red Team System</p>
    </div>

    <div class="diagram-container">
        <svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>

          <!-- Orchestrator -->
          <rect id="nodeOrchestrator" x="210" y="20" width="260" height="56" rx="8" fill="#1e1b4b" stroke="#534AB7" stroke-width="0.5"/>
          <text font-family="monospace" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="43" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
          <text font-family="monospace" font-size="11" fill="#AFA9EC" x="340" y="61" text-anchor="middle" dominant-baseline="central">coordinating attempt loop</text>

          <!-- Orchestrator -> Attacker / Target edges -->
          <line id="edgeOrchAttacker" class="edge" x1="320" y1="76" x2="160" y2="138" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
          <line id="edgeOrchTarget" class="edge" x1="360" y1="76" x2="520" y2="138" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

          <!-- Attacker -->
          <rect id="nodeAttacker" x="30" y="138" width="260" height="56" rx="8" fill="#2d1a14" stroke="#993C1D" stroke-width="0.5"/>
          <text font-family="monospace" font-size="14" font-weight="500" fill="#F5C4B3" x="160" y="161" text-anchor="middle" dominant-baseline="central">Attacker</text>
          <text font-family="monospace" font-size="11" fill="#F0997B" x="160" y="179" text-anchor="middle" dominant-baseline="central">skill library</text>

          <!-- Attacker -> Target (MCP call) -->
          <line id="edgeAttackerTarget" class="edge" x1="290" y1="166" x2="388" y2="166" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
          <text id="mcpLabel" font-family="monospace" font-size="11" fill="#8b949e" x="340" y="156" text-anchor="middle">MCP call</text>

          <!-- Target -->
          <rect id="nodeTarget" x="390" y="138" width="260" height="56" rx="8" fill="#0c1929" stroke="#185FA5" stroke-width="0.5"/>
          <text font-family="monospace" font-size="14" font-weight="500" fill="#B5D4F4" x="520" y="161" text-anchor="middle" dominant-baseline="central">Target</text>
          <text font-family="monospace" font-size="11" fill="#85B7EB" x="520" y="179" text-anchor="middle" dominant-baseline="central">FastMCP · real tool calls</text>

          <!-- Target -> Judge -->
          <line id="edgeTargetJudge" class="edge" x1="450" y1="194" x2="380" y2="222" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

          <!-- Judge -->
          <rect id="nodeJudge" x="210" y="222" width="260" height="56" rx="8" fill="#0a1f1a" stroke="#0F6E56" stroke-width="0.5"/>
          <text font-family="monospace" font-size="14" font-weight="500" fill="#9FE1CB" x="340" y="245" text-anchor="middle" dominant-baseline="central">Judge</text>
          <text font-family="monospace" font-size="11" fill="#5DCAA5" x="340" y="263" text-anchor="middle" dominant-baseline="central">severity 1–5</text>
        </svg>
    </div>

    <div class="status-bar" id="statusBar">Waiting...</div>

    <div id="report-link-container" style="display:none; text-align:center; margin-top:-20px; margin-bottom: 20px;">
        <a href="/report" target="_blank" id="report-btn">View Full Report →</a>
    </div>

    <div class="grid-container" id="cardsGrid">
        <!-- Cards injected here -->
    </div>

    <button class="run-btn" id="runBtn">Run Pipeline</button>

    <script>
        const runBtn = document.getElementById('runBtn');
        const statusBar = document.getElementById('statusBar');
        const cardsGrid = document.getElementById('cardsGrid');
        
        const nodeOrchestrator = document.getElementById('nodeOrchestrator');
        const nodeAttacker = document.getElementById('nodeAttacker');
        const nodeTarget = document.getElementById('nodeTarget');
        const nodeJudge = document.getElementById('nodeJudge');
        
        const edgeOrchAttacker = document.getElementById('edgeOrchAttacker');
        const edgeOrchTarget = document.getElementById('edgeOrchTarget');
        const edgeAttackerTarget = document.getElementById('edgeAttackerTarget');
        const edgeTargetJudge = document.getElementById('edgeTargetJudge');
        const mcpLabel = document.getElementById('mcpLabel');

        let maxAttempts = 0;
        let eventSource = null;

        function truncate(str, n) {
            if (!str) return "";
            return (str.length > n) ? str.slice(0, n - 1) + '&hellip;' : str;
        }

        function getSevColor(sev) {
            const colors = {
                1: '#8b949e',
                2: '#58a6ff',
                3: '#e3b341',
                4: '#f78166',
                5: '#da3633'
            };
            return colors[sev] || colors[1];
        }

        function resetEdges() {
            document.querySelectorAll('.edge').forEach(e => {
                e.classList.remove('active');
                e.setAttribute('stroke', '#8b949e');
            });
            document.getElementById('mcpLabel').classList.remove('active');
            [nodeOrchestrator, nodeAttacker, nodeTarget].forEach(n => n.style.fill = '');
        }

        document.getElementById('clear-log-btn').addEventListener('click', async () => {
            if (!confirm('Clear all logged attempts? This cannot be undone.')) return;
            await fetch('/clear-log', { method: 'POST' });
            cardsGrid.innerHTML = '';
            statusBar.textContent = 'Log cleared. Ready to run.';
        });

        runBtn.addEventListener('click', () => {
            runBtn.disabled = true;
            cardsGrid.innerHTML = '';
            document.getElementById('report-link-container').style.display = 'none';
            resetEdges();
            statusBar.textContent = "Connecting to pipeline...";

            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/stream');

            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                switch (data.type) {
                    case 'pipeline_start':
                        maxAttempts = data.max_attempts;
                        statusBar.textContent = `Pipeline Started (Max Attempts: ${maxAttempts})`;
                        resetEdges();
                        nodeOrchestrator.style.fill = 'rgba(83, 74, 183, 0.25)';
                        edgeOrchAttacker.classList.add('active');
                        edgeOrchAttacker.setAttribute('stroke', '#534AB7');
                        edgeOrchTarget.classList.add('active');
                        edgeOrchTarget.setAttribute('stroke', '#534AB7');
                        break;

                    case 'attacker_payload':
                        statusBar.textContent = `Attempt ${data.attempt} of ${maxAttempts} — Attacker generated payload`;
                        resetEdges();
                        nodeAttacker.style.fill = 'rgba(153, 60, 29, 0.25)';
                        edgeAttackerTarget.classList.add('active');
                        edgeAttackerTarget.setAttribute('stroke', '#EF9F27');
                        document.getElementById('mcpLabel').classList.add('active');
                        break;

                    case 'target_response':
                        statusBar.textContent = `Attempt ${data.attempt} of ${maxAttempts} — Target responded`;
                        resetEdges();
                        nodeTarget.style.fill = 'rgba(24, 95, 165, 0.25)';
                        edgeTargetJudge.classList.add('active');
                        edgeTargetJudge.setAttribute('stroke', '#185FA5');
                        break;

                    case 'judge_verdict':
                        statusBar.textContent = `Attempt ${data.attempt} of ${maxAttempts} — Judge scored Severity ${data.severity}`;
                        // Flash judge node
                        nodeJudge.style.setProperty('--flash-color', getSevColor(data.severity));
                        nodeJudge.classList.remove('flash-judge');
                        // Trigger reflow
                        void nodeJudge.offsetWidth; 
                        nodeJudge.classList.add('flash-judge');
                        break;

                    case 'attempt_complete':
                        const card = document.createElement('div');
                        card.className = 'attempt-card';
                        
                        const payloadTrunc = truncate(data.payload, 120);
                        const verdictTrunc = truncate(data.verdict, 100);
                        
                        card.innerHTML = `
                            <div class="card-header">
                                <span class="card-title">Attempt ${data.attempt}</span>
                                <span class="badge sev-${data.severity}">Sev ${data.severity}</span>
                            </div>
                            <div class="skill-name">${data.skill}</div>
                            <div class="card-body">
                                <div class="card-label">Payload</div>
                                <div class="text-content"><p>${payloadTrunc}</p></div>
                                <div class="card-label">Judge Verdict</div>
                                <div class="text-content"><p>${verdictTrunc}</p></div>
                            </div>
                        `;
                        cardsGrid.appendChild(card);
                        break;

                    case 'pipeline_complete':
                        statusBar.textContent = `Complete — Total Attempts: ${data.total_attempts}, Max severity: ${data.max_severity}`;
                        resetEdges();
                        runBtn.disabled = false;
                        document.getElementById('report-link-container').style.display = 'block';
                        eventSource.close();
                        break;
                }
            };

            eventSource.onerror = (err) => {
                console.error("EventSource failed:", err);
                statusBar.textContent = "Error: Stream connection lost.";
                runBtn.disabled = false;
                resetEdges();
                eventSource.close();
            };
        });
    </script>
</body>
</html>
